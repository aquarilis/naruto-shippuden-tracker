<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naruto — Sélection du Personnage</title>
<link rel="stylesheet" href="style.css">
<style>
body { padding: 16px 14px 32px; }

.header h1 { font-size: clamp(0.8rem, 3.5vw, 1.3rem); }

/* ── Stats preview ── */
.stats-grid {
  display: flex;
  gap: 12px;
}

.stat-preview {
  flex: 1;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-icon { font-size: 1.3rem; }
.stat-preview-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.stat-preview-value { font-size: 1.8rem; font-weight: 800; color: var(--text); }

/* ── Step indicator ── */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}
.step-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.2s;
}
.step-dot.active { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
.step-dot.done   { background: var(--muted); }
.step-label {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── Selected ninja summary (step 2) ── */
.selected-summary {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.selected-summary-name { font-weight: 700; font-size: 0.95rem; }
.selected-summary-stats { font-size: 0.8rem; color: var(--muted); }
</style>
</head>
<body>

<!-- ══════════════ STEP 1 : NINJA DU CLAN ══════════════ -->
<div id="step1Screen">
  <div class="header">
    <a href="index.html"><img src="img/naruto_shippuden_logo.svg" alt="Naruto" class="header-logo-left"></a>
    <div class="header-center">
      <h1>Sélection du Personnage</h1>
      <div class="sub" id="step1Subtitle">Tour —</div>
    </div>
    <img id="teamLogo1" src="" alt="Team" class="header-logo-right">
  </div>

  <div class="step-indicator">
    <div class="step-dot active" id="dot1a"></div>
    <div class="step-label">Votre ninja</div>
    <div style="width:24px; height:1px; background:var(--border);"></div>
    <div class="step-dot" id="dot1b"></div>
    <div class="step-label">Adversaire</div>
  </div>

  <div id="errorMsg1" class="error-msg"></div>

  <div class="card">
    <div class="card-label" id="playerCardLabel">Ninja</div>
    <div class="field">
      <select id="characterSelect" onchange="onCharacterChange()">
        <option value="">— Sélectionner —</option>
      </select>
    </div>
    <div id="statsPreview" style="display:none; margin-top:12px;">
      <div class="stats-grid">
        <div class="stat-preview">
          <span class="stat-icon">❤️</span>
          <span class="stat-preview-label">PV</span>
          <span class="stat-preview-value" id="previewHP">—</span>
        </div>
        <div class="stat-preview">
          <span class="stat-icon">💙</span>
          <span class="stat-preview-label">Chakra</span>
          <span class="stat-preview-value" id="previewChakra">—</span>
        </div>
        <div class="stat-preview">
          <span class="stat-icon">⭐</span>
          <span class="stat-preview-label">XP</span>
          <span class="stat-preview-value" id="previewXP">—</span>
        </div>
      </div>
    </div>
  </div>

  <div id="noCharMsg" class="card" style="display:none; text-align:center; color:var(--muted); font-size:0.85rem; padding: 20px 16px;">
    Aucun personnage disponible pour ce tour.
  </div>

  <button class="btn btn-orange" id="nextBtn" onclick="goToStep2()" disabled style="opacity:0.4;">Passer à la sélection de l'adversaire →</button>
  <button class="btn btn-ghost" onclick="window.location.href='game_tracker.html'" style="margin-top:8px;">Annuler</button>
</div>

<!-- ══════════════ STEP 2 : ADVERSAIRE ══════════════ -->
<div id="step2Screen" class="hidden">
  <div class="header">
    <a href="index.html"><img src="img/naruto_shippuden_logo.svg" alt="Naruto" class="header-logo-left"></a>
    <div class="header-center">
      <h1>Sélection de l'Adversaire</h1>
      <div class="sub" id="step2Subtitle">Tour —</div>
    </div>
    <img id="teamLogo2" src="" alt="Team" class="header-logo-right">
  </div>

  <div class="step-indicator">
    <div class="step-dot done"></div>
    <div class="step-label">Votre ninja</div>
    <div style="width:24px; height:1px; background:var(--border);"></div>
    <div class="step-dot active"></div>
    <div class="step-label">Adversaire</div>
  </div>

  <!-- Selected ninja recap -->
  <div class="card" style="padding: 12px 16px;">
    <div class="card-label" style="margin-bottom:8px;">Votre ninja</div>
    <div class="selected-summary">
      <span class="selected-summary-name" id="summaryName">—</span>
      <span class="selected-summary-stats" id="summaryStats">—</span>
    </div>
  </div>

  <div id="errorMsg2" class="error-msg"></div>

  <div class="card">
    <div class="card-label" id="opponentCardLabel">Adversaire</div>
    <div class="field">
      <select id="opponentSelect" onchange="onOpponentChange()">
        <option value="">— Sélectionner —</option>
      </select>
    </div>
    <div id="opponentPreview" style="display:none; margin-top:12px;">
      <div class="stats-grid">
        <div class="stat-preview">
          <span class="stat-icon">❤️</span>
          <span class="stat-preview-label">PV</span>
          <span class="stat-preview-value" id="opponentPreviewHP">—</span>
        </div>
        <div class="stat-preview">
          <span class="stat-icon">💙</span>
          <span class="stat-preview-label">Chakra</span>
          <span class="stat-preview-value" id="opponentPreviewChakra">—</span>
        </div>
        <div class="stat-preview">
          <span class="stat-icon">⭐</span>
          <span class="stat-preview-label">XP</span>
          <span class="stat-preview-value" id="opponentPreviewXP">—</span>
        </div>
      </div>
    </div>
  </div>

  <div id="noOpponentMsg" class="card" style="display:none; text-align:center; color:var(--muted); font-size:0.85rem; padding: 20px 16px;">
    Aucun adversaire disponible pour ce tour.
  </div>

  <button class="btn btn-orange" id="startBtn" onclick="startCombat()" disabled style="opacity:0.4;">Commencer le combat →</button>
  <button class="btn btn-ghost" onclick="goBackToStep1()" style="margin-top:8px;">← Retour</button>
</div>

<script>
let roster = [];
let selectedCharacter = null;
let selectedOpponent = null;

function getGameData() {
  return JSON.parse(sessionStorage.getItem('gameData')) || { team: null, turns: [] };
}

function getTeamLogoPath(team) {
  return team === 'alliance' ? 'img/alliance_shinobi.svg' : 'img/akatsuki.svg';
}

function isAvailable(c, currentTurn) {
  if (c.available_from_turn > currentTurn) return false;
  if (c.available_until_turn !== null && c.available_until_turn !== undefined && currentTurn > c.available_until_turn) return false;
  return true;
}

function populateSelect(selectId, characters, currentTurn) {
  const select = document.getElementById(selectId);
  select.innerHTML = '<option value="">— Sélectionner —</option>';
  const sorted = [...characters].sort((a, b) =>
    (isAvailable(a, currentTurn) ? 0 : 1) - (isAvailable(b, currentTurn) ? 0 : 1)
  );
  sorted.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name;
    if (!isAvailable(c, currentTurn)) {
      let reason;
      if (c.available_from_turn > currentTurn) {
        reason = `disponible à partir du tour ${c.available_from_turn}`;
      } else {
        reason = `disponible jusqu'au tour ${c.available_until_turn}`;
      }
      opt.textContent = `${c.name} (${reason})`;
      opt.disabled = true;
      opt.style.color = '#7a7da0';
    } else {
      opt.textContent = c.name;
    }
    select.appendChild(opt);
  });
}

function initializePage() {
  const gameData = getGameData();

  if (!gameData.team) {
    window.location.href = 'index.html';
    return;
  }

  const logoPath = getTeamLogoPath(gameData.team);
  document.getElementById('teamLogo1').src = logoPath;
  document.getElementById('teamLogo2').src = logoPath;

  const currentTurn = gameData.turns.length + 1;
  const tourLabel = `Tour ${currentTurn}`;
  document.getElementById('step1Subtitle').textContent = tourLabel;
  document.getElementById('step2Subtitle').textContent = tourLabel;

  const myTeam = gameData.team.toLowerCase();
  const opponentTeam = myTeam === 'alliance' ? 'akatsuki' : 'alliance';

  const myTeamLabel = myTeam === 'alliance' ? "Ninja de l'Alliance Shinobi" : "Ninja de l'Akatsuki";
  const opponentTeamLabel = opponentTeam === 'alliance' ? "Ninja de l'Alliance Shinobi" : "Ninja de l'Akatsuki";

  document.getElementById('playerCardLabel').textContent = myTeamLabel;
  document.getElementById('opponentCardLabel').textContent = opponentTeamLabel;

  const myRoster = roster.filter(c => c.team.toLowerCase() === myTeam);
  const opponentRoster = roster.filter(c => c.team.toLowerCase() === opponentTeam);

  if (myRoster.length === 0) {
    document.getElementById('characterSelect').parentElement.style.display = 'none';
    document.getElementById('noCharMsg').style.display = 'block';
  } else {
    populateSelect('characterSelect', myRoster, currentTurn);
  }

  if (opponentRoster.length === 0) {
    document.getElementById('opponentSelect').parentElement.style.display = 'none';
    document.getElementById('noOpponentMsg').style.display = 'block';
  } else {
    populateSelect('opponentSelect', opponentRoster, currentTurn);
  }
}

function renderStatsPreview(character, previewId, hpId, chakraId, xpId) {
  const preview = document.getElementById(previewId);
  if (!character) {
    preview.style.display = 'none';
    return;
  }
  document.getElementById(hpId).textContent = character.hp;
  document.getElementById(chakraId).textContent = character.extra_mp
    ? `${character.mp}+${character.extra_mp}`
    : character.mp;
  if (xpId) document.getElementById(xpId).textContent = character.xp ?? '—';
  preview.style.display = 'block';
}

function onCharacterChange() {
  const name = document.getElementById('characterSelect').value;
  selectedCharacter = roster.find(c => c.name === name) || null;
  renderStatsPreview(selectedCharacter, 'statsPreview', 'previewHP', 'previewChakra', 'previewXP');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = !selectedCharacter;
  nextBtn.style.opacity = selectedCharacter ? '1' : '0.4';
}

function onOpponentChange() {
  const name = document.getElementById('opponentSelect').value;
  selectedOpponent = roster.find(c => c.name === name) || null;
  renderStatsPreview(selectedOpponent, 'opponentPreview', 'opponentPreviewHP', 'opponentPreviewChakra', 'opponentPreviewXP');
  const startBtn = document.getElementById('startBtn');
  startBtn.disabled = !selectedOpponent;
  startBtn.style.opacity = selectedOpponent ? '1' : '0.4';
}

function goToStep2() {
  if (!selectedCharacter) return;

  const totalChakra = (selectedCharacter.mp || 0) + (selectedCharacter.extra_mp || 0);
  document.getElementById('summaryName').textContent = selectedCharacter.name;
  document.getElementById('summaryStats').textContent = `❤️ ${selectedCharacter.hp} PV · 💙 ${totalChakra} PC · ⭐ ${selectedCharacter.xp ?? 0} XP`;

  document.getElementById('step1Screen').classList.add('hidden');
  document.getElementById('step2Screen').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function goBackToStep1() {
  document.getElementById('step2Screen').classList.add('hidden');
  document.getElementById('step1Screen').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function startCombat() {
  if (!selectedCharacter || !selectedOpponent) return;

  const totalChakra = (selectedCharacter.mp || 0) + (selectedCharacter.extra_mp || 0);
  const params = new URLSearchParams({
    name: selectedCharacter.name,
    hp: selectedCharacter.hp,
    chakra: totalChakra,
    opponent: selectedOpponent.name,
    opponentXp: selectedOpponent.xp ?? 0
  });

  window.location.href = `combat.html?${params.toString()}`;
}

const ROSTER_FALLBACK = [
  {"name":"Naruto","team":"alliance","hp":12,"mp":5,"extra_mp":1,"xp":3,"available_from_turn":1,"available_until_turn":null},
  {"name":"Sasuke","team":"alliance","hp":10,"mp":3,"extra_mp":null,"xp":2,"available_from_turn":1,"available_until_turn":1},
  {"name":"Naruto 2","team":"alliance","hp":9,"mp":2,"extra_mp":null,"xp":4,"available_from_turn":5,"available_until_turn":null},
  {"name":"Kakashi","team":"alliance","hp":10,"mp":3,"extra_mp":null,"xp":3,"available_from_turn":1,"available_until_turn":null},
  {"name":"Kisame","team":"akatsuki","hp":15,"mp":5,"extra_mp":2,"xp":5,"available_from_turn":1,"available_until_turn":null},
  {"name":"Itachi","team":"akatsuki","hp":16,"mp":4,"extra_mp":null,"xp":6,"available_from_turn":1,"available_until_turn":null},
  {"name":"Obito","team":"akatsuki","hp":12,"mp":2,"extra_mp":null,"xp":7,"available_from_turn":3,"available_until_turn":null}
];

window.addEventListener('load', () => {
  fetch('roster.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      roster = data;
      initializePage();
    })
    .catch(() => {
      roster = ROSTER_FALLBACK;
      initializePage();
    });
});
</script>

</body>
</html>
