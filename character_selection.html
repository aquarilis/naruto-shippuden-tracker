<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naruto — Sélection du Personnage</title>
<link rel="stylesheet" href="style.css">
<style>
body { padding: 16px 14px 32px; }

.header h1 { font-size: clamp(0.8rem, 3.5vw, 1.3rem); }

/* ── Step indicator ── */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}
.step-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.2s;
}
.step-dot.active { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
.step-dot.done   { background: var(--muted); }
.step-label {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── Roster grid ── */
.roster-grid {
  display: flex;
  flex-wrap: nowrap;
  gap: 12px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}

.roster-card {
  position: relative;
  border-radius: 12px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  background: var(--card);
  display: inline-block;
  width: auto;
  flex-shrink: 0;
}

.roster-card:active { transform: scale(0.97); }

.roster-card.selected {
  border-color: var(--orange);
  box-shadow: 0 0 0 2px rgba(255,109,0,0.35);
}

.roster-card.unavailable {
  cursor: default;
  opacity: 1;
}

.roster-card img {
  display: block;
  height: 320px;
  width: auto;
}

.roster-card.unavailable img {
  filter: grayscale(1) brightness(0.45);
}

.roster-card-caption {
  font-size: 0.7rem;
  color: var(--muted);
  text-align: center;
  padding: 4px 6px;
}


/* ── Selected recap (step 2) ── */
.selected-summary {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 4px;
}
.selected-summary img {
  width: auto;
  height: 80px;
  border-radius: 8px;
  border: 1px solid var(--border);
  display: block;
}
.selected-summary-name { font-weight: 700; font-size: 0.95rem; }
.selected-summary-stats { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<!-- ══════════════ STEP 1 : NINJA DU CLAN ══════════════ -->
<div id="step1Screen">
  <div class="header">
    <a href="index.html"><img src="img/naruto_shippuden_logo.svg" alt="Naruto" class="header-logo-left"></a>
    <div class="header-center">
      <h1>Sélection du Personnage</h1>
      <div class="sub" id="step1Subtitle">Tour —</div>
    </div>
    <img id="teamLogo1" src="" alt="Team" class="header-logo-right">
  </div>

  <div class="step-indicator">
    <div class="step-dot active"></div>
    <div class="step-label">Votre ninja</div>
    <div style="width:24px; height:1px; background:var(--border);"></div>
    <div class="step-dot"></div>
    <div class="step-label">Adversaire</div>
  </div>

  <div class="card-label" id="playerCardLabel" style="margin-bottom:12px;">Ninja</div>

  <div id="noCharMsg" style="display:none; text-align:center; color:var(--muted); font-size:0.85rem; padding: 20px 16px;">
    Aucun personnage disponible pour ce tour.
  </div>

  <div class="roster-grid" id="characterGrid"></div>

  <button class="btn btn-orange" id="nextBtn" onclick="goToStep2()" disabled style="opacity:0.4;">Suivant →</button>
  <button class="btn btn-ghost" onclick="window.location.href='game_tracker.html'" style="margin-top:8px;">Annuler</button>
</div>

<!-- ══════════════ STEP 2 : ADVERSAIRE ══════════════ -->
<div id="step2Screen" class="hidden">
  <div class="header">
    <a href="index.html"><img src="img/naruto_shippuden_logo.svg" alt="Naruto" class="header-logo-left"></a>
    <div class="header-center">
      <h1>Sélection de l'Adversaire</h1>
      <div class="sub" id="step2Subtitle">Tour —</div>
    </div>
    <img id="teamLogo2" src="" alt="Team" class="header-logo-right">
  </div>

  <div class="step-indicator">
    <div class="step-dot done"></div>
    <div class="step-label">Votre ninja</div>
    <div style="width:24px; height:1px; background:var(--border);"></div>
    <div class="step-dot active"></div>
    <div class="step-label">Adversaire</div>
  </div>

  <!-- Selected ninja recap -->
  <div class="card" style="padding: 12px 16px; margin-bottom:16px;">
    <div class="card-label" style="margin-bottom:8px;">Votre ninja</div>
    <div class="selected-summary">
      <img id="summaryImg" src="" alt="">
      <div>
        <div class="selected-summary-name" id="summaryName">—</div>
        <div class="selected-summary-stats" id="summaryStats">—</div>
      </div>
    </div>
  </div>

  <div class="card-label" id="opponentCardLabel" style="margin-bottom:12px;">Adversaire</div>

  <div id="noOpponentMsg" style="display:none; text-align:center; color:var(--muted); font-size:0.85rem; padding: 20px 16px;">
    Aucun adversaire disponible pour ce tour.
  </div>

  <div class="roster-grid" id="opponentGrid"></div>

  <button class="btn btn-orange" id="startBtn" onclick="goToConfirm()" disabled style="opacity:0.4;">Suivant →</button>
  <button class="btn btn-ghost" onclick="goBackToStep1()" style="margin-top:8px;">← Retour</button>
</div>

<!-- ══════════════ STEP 3 : CONFIRMATION ══════════════ -->
<div id="step3Screen" class="hidden">
  <div class="header">
    <a href="index.html"><img src="img/naruto_shippuden_logo.svg" alt="Naruto" class="header-logo-left"></a>
    <div class="header-center">
      <h1>Confirmation</h1>
      <div class="sub" id="step3Subtitle">Tour —</div>
    </div>
    <img id="teamLogo3" src="" alt="Team" class="header-logo-right">
  </div>

  <div style="display:flex; gap:16px; align-items:flex-start; justify-content:center; margin-bottom:20px;">
    <div style="text-align:center; flex:1;">
      <div class="card-label" style="margin-bottom:8px;">Votre ninja</div>
      <div style="display:inline-block; border-radius:12px; border:2px solid var(--orange); overflow:hidden;">
        <img id="confirmPlayerImg" src="" alt="" style="display:block; height:200px; width:auto; max-width:100%;">
      </div>
    </div>
    <div style="display:flex; align-items:center; padding-top:90px; font-size:1.5rem; font-weight:900; color:var(--muted);">VS</div>
    <div style="text-align:center; flex:1;">
      <div class="card-label" style="margin-bottom:8px;">Adversaire</div>
      <div style="display:inline-block; border-radius:12px; border:2px solid var(--hp); overflow:hidden;">
        <img id="confirmOpponentImg" src="" alt="" style="display:block; height:200px; width:auto; max-width:100%;">
      </div>
    </div>
  </div>

  <button class="btn btn-orange" onclick="startCombat()">⚔️ Commencer le combat →</button>
  <button class="btn btn-ghost" onclick="goBackToStep2()" style="margin-top:8px;">← Retour</button>
</div>

<script>
let roster = [];
let selectedCharacter = null;
let selectedOpponent = null;

function getGameData() {
  return JSON.parse(sessionStorage.getItem('gameData')) || { team: null, turns: [] };
}

function getTeamLogoPath(team) {
  return team === 'alliance' ? 'img/alliance_shinobi.svg' : 'img/akatsuki.svg';
}

function isAvailable(c, currentTurn) {
  if (c.available_from_turn > currentTurn) return false;
  if (c.available_until_turn !== null && c.available_until_turn !== undefined && currentTurn > c.available_until_turn) return false;
  return true;
}

function unavailableReason(c, currentTurn) {
  if (c.available_from_turn > currentTurn) return `Disponible à partir du tour ${c.available_from_turn}`;
  return `Disponible jusqu'au tour ${c.available_until_turn}`;
}

function buildRosterGrid(gridId, characters, currentTurn, onSelect) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  const sorted = [...characters].sort((a, b) => {
    const aAvail = isAvailable(a, currentTurn) ? 0 : 1;
    const bAvail = isAvailable(b, currentTurn) ? 0 : 1;
    if (aAvail !== bAvail) return aAvail - bAvail;
    return a.name.localeCompare(b.name);
  });
  sorted.forEach(c => {
    const available = isAvailable(c, currentTurn);
    const card = document.createElement('div');
    card.className = 'roster-card' + (available ? '' : ' unavailable');
    card.dataset.name = c.name;
    if (!available) card.title = unavailableReason(c, currentTurn);

    const img = document.createElement('img');
    img.src = c.roster_image ? `img/roster/${c.roster_image}` : '';
    img.alt = c.name;
    img.loading = 'lazy';

    card.appendChild(img);

    if (!available) {
      const caption = document.createElement('div');
      caption.className = 'roster-card-caption';
      caption.textContent = unavailableReason(c, currentTurn);
      card.appendChild(caption);
    }

    if (available) {
      card.addEventListener('click', () => onSelect(c, card, gridId));
    }

    grid.appendChild(card);
  });
}

function selectCard(character, card, gridId) {
  document.querySelectorAll(`#${gridId} .roster-card`).forEach(el => el.classList.remove('selected'));
  card.classList.add('selected');
  return character;
}

function onCharacterSelect(c, card) {
  selectedCharacter = selectCard(c, card, 'characterGrid');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = false;
  nextBtn.style.opacity = '1';
}

function onOpponentSelect(c, card) {
  selectedOpponent = selectCard(c, card, 'opponentGrid');
  const startBtn = document.getElementById('startBtn');
  startBtn.disabled = false;
  startBtn.style.opacity = '1';
}

function goToConfirm() {
  if (!selectedCharacter || !selectedOpponent) return;
  document.getElementById('confirmPlayerImg').src = selectedCharacter.roster_image
    ? `img/roster/${selectedCharacter.roster_image}` : '';
  document.getElementById('confirmOpponentImg').src = selectedOpponent.roster_image
    ? `img/roster/${selectedOpponent.roster_image}` : '';
  document.getElementById('step2Screen').classList.add('hidden');
  document.getElementById('step3Screen').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function goBackToStep2() {
  document.getElementById('step3Screen').classList.add('hidden');
  document.getElementById('step2Screen').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function initializePage() {
  const gameData = getGameData();

  if (!gameData.team) {
    window.location.href = 'index.html';
    return;
  }

  const logoPath = getTeamLogoPath(gameData.team);
  document.getElementById('teamLogo1').src = logoPath;
  document.getElementById('teamLogo2').src = logoPath;
  document.getElementById('teamLogo3').src = logoPath;

  const currentTurn = gameData.turns.length + 1;
  const tourLabel = `Tour ${currentTurn}`;
  document.getElementById('step1Subtitle').textContent = tourLabel;
  document.getElementById('step2Subtitle').textContent = tourLabel;
  document.getElementById('step3Subtitle').textContent = tourLabel;

  const myTeam = gameData.team.toLowerCase();
  const opponentTeam = myTeam === 'alliance' ? 'akatsuki' : 'alliance';

  document.getElementById('playerCardLabel').textContent =
    myTeam === 'alliance' ? "Ninja de l'Alliance Shinobi" : "Ninja de l'Akatsuki";
  document.getElementById('opponentCardLabel').textContent =
    opponentTeam === 'alliance' ? "Ninja de l'Alliance Shinobi" : "Ninja de l'Akatsuki";

  const myRoster = roster.filter(c => c.team.toLowerCase() === myTeam);
  const opponentRoster = roster.filter(c => c.team.toLowerCase() === opponentTeam);

  if (myRoster.length === 0) {
    document.getElementById('noCharMsg').style.display = 'block';
  } else {
    buildRosterGrid('characterGrid', myRoster, currentTurn, onCharacterSelect);
  }

  if (opponentRoster.length === 0) {
    document.getElementById('noOpponentMsg').style.display = 'block';
  } else {
    buildRosterGrid('opponentGrid', opponentRoster, currentTurn, onOpponentSelect);
  }
}

function goToStep2() {
  if (!selectedCharacter) return;

  const totalChakra = (selectedCharacter.mp || 0) + (selectedCharacter.extra_mp || 0);
  document.getElementById('summaryImg').src = selectedCharacter.roster_image
    ? `img/roster/${selectedCharacter.roster_image}` : '';
  document.getElementById('summaryName').textContent = selectedCharacter.name;
  document.getElementById('summaryStats').textContent =
    `❤️ ${selectedCharacter.hp} PV · 💙 ${totalChakra} PC · ⭐ ${selectedCharacter.xp ?? 0} XP`;

  document.getElementById('step1Screen').classList.add('hidden');
  document.getElementById('step2Screen').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function goBackToStep1() {
  document.getElementById('step2Screen').classList.add('hidden');
  document.getElementById('step1Screen').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function startCombat() {
  if (!selectedCharacter || !selectedOpponent) return;

  const totalChakra = (selectedCharacter.mp || 0) + (selectedCharacter.extra_mp || 0);
  const params = new URLSearchParams({
    name: selectedCharacter.name,
    hp: selectedCharacter.hp,
    chakra: totalChakra,
    opponent: selectedOpponent.name,
    opponentXp: selectedOpponent.xp ?? 0,
    playerImage: selectedCharacter.roster_image ?? '',
    opponentImage: selectedOpponent.roster_image ?? ''
  });

  window.location.href = `combat.html?${params.toString()}`;
}

const ROSTER_FALLBACK = [
  {"name":"Tobirama Senju","team":"alliance","hp":72,"mp":22,"extra_mp":null,"xp":5,"available_from_turn":1,"available_until_turn":3,"roster_image":"tobirama_senju.png"},
  {"name":"Hashirama Senju","team":"alliance","hp":74,"mp":23,"extra_mp":null,"xp":5,"available_from_turn":1,"available_until_turn":4,"roster_image":"hashirama_senju.png"},
  {"name":"Minato Namikaze","team":"alliance","hp":75,"mp":24,"extra_mp":2,"xp":5,"available_from_turn":2,"available_until_turn":2,"roster_image":"minato_namikaze.png"},
  {"name":"Mei Terumi","team":"akatsuki","hp":57,"mp":17,"extra_mp":null,"xp":4,"available_from_turn":1,"available_until_turn":null,"roster_image":"mei_terumi.png"},
  {"name":"Tsunade","team":"akatsuki","hp":58,"mp":17,"extra_mp":null,"xp":4,"available_from_turn":1,"available_until_turn":3,"roster_image":"tsunade.png"},
  {"name":"Naruo Uzumaki","team":"akatsuki","hp":67,"mp":22,"extra_mp":5,"xp":4,"available_from_turn":2,"available_until_turn":4,"roster_image":"naruto_uzumaki_deck_3.png"}
];

window.addEventListener('load', () => {
  fetch('roster.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      roster = data;
      initializePage();
    })
    .catch(() => {
      roster = ROSTER_FALLBACK;
      initializePage();
    });
});
</script>

</body>
</html>
