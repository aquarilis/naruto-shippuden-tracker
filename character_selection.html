<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naruto — Sélection du Personnage</title>
<style>
:root {
  --hp: #e53935;
  --hp-dark: #8b0000;
  --chakra: #1e88e5;
  --chakra-dark: #0a3d7a;
  --heal: #43a047;
  --bg: #0e0e1a;
  --card: #16182e;
  --card2: #1e2040;
  --border: #2a2d50;
  --text: #e8e8f0;
  --muted: #7a7da0;
  --orange: #ff6d00;
  --orange2: #ff9100;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding: 16px 14px 32px;
}

/* ── Header with dual logos ── */
.header {
  position: relative;
  min-height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.header-logo-left {
  position: absolute;
  left: 0;
  width: 100px;
  height: auto;
}

.header-logo-right {
  position: absolute;
  right: 0;
  width: 100px;
  height: auto;
}

.header h1 {
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
  margin: 0;
}

.header .sub {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 16px;
  margin-bottom: 14px;
}
.card-label {
  font-size: 0.7rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ── Form inputs ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 6px;
}
input[type="text"], input[type="number"] {
  width: 100%;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1.05rem;
  padding: 11px 14px;
  outline: none;
  -webkit-appearance: none;
}
input[type="number"] {
  font-size: 1.5rem;
  text-align: center;
  font-weight: 700;
}
input:focus { border-color: var(--orange); }

/* ── Buttons ── */
.btn {
  display: block;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: opacity 0.12s, transform 0.08s;
  text-align: center;
}
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn-orange { background: linear-gradient(135deg, var(--orange), var(--orange2)); color: #fff; }

.error-msg {
  background: var(--hp-dark);
  border: 1px solid var(--hp);
  border-radius: 10px;
  color: #ffcccc;
  padding: 12px 14px;
  margin-bottom: 14px;
  font-size: 0.85rem;
  display: none;
}

select {
  width: 100%;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1.05rem;
  padding: 11px 14px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  cursor: pointer;
}
select:focus { border-color: var(--orange); }

.stats-grid {
  display: flex;
  gap: 12px;
}

.stat-preview {
  flex: 1;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-icon { font-size: 1.3rem; }
.stat-preview-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.stat-preview-value { font-size: 1.8rem; font-weight: 800; color: var(--text); }
</style>
</head>
<body>

<div id="selectionScreen">
  <div class="header">
    <img src="img/naruto_shippuden_logo.png" alt="Naruto" class="header-logo-left">
    <div>
      <h1>Sélection du Personnage</h1>
      <div class="sub">Choix du combattant</div>
    </div>
    <img id="teamLogo" src="" alt="Team" class="header-logo-right">
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <div class="card">
    <div class="card-label">Personnage</div>
    <div class="field">
      <label>Choisir un ninja</label>
      <select id="characterSelect" onchange="onCharacterChange()">
        <option value="">— Sélectionner —</option>
      </select>
    </div>
  </div>

  <div id="statsPreview" class="card" style="display:none;">
    <div class="card-label">Statistiques</div>
    <div class="stats-grid">
      <div class="stat-preview">
        <span class="stat-icon">❤️</span>
        <span class="stat-preview-label">PV</span>
        <span class="stat-preview-value" id="previewHP">—</span>
      </div>
      <div class="stat-preview">
        <span class="stat-icon">💙</span>
        <span class="stat-preview-label">Chakra</span>
        <span class="stat-preview-value" id="previewChakra">—</span>
      </div>
    </div>
  </div>

  <div id="noCharMsg" class="card" style="display:none; text-align:center; color:var(--muted); font-size:0.85rem; padding: 20px 16px;">
    Aucun personnage disponible pour ce tour.
  </div>

  <div class="card">
    <div class="card-label">Adversaire</div>
    <div class="field">
      <label>Choisir l'adversaire</label>
      <select id="opponentSelect" onchange="onOpponentChange()">
        <option value="">— Sélectionner —</option>
      </select>
    </div>
  </div>

  <div id="opponentPreview" class="card" style="display:none;">
    <div class="card-label">Statistiques adversaire</div>
    <div class="stats-grid">
      <div class="stat-preview">
        <span class="stat-icon">❤️</span>
        <span class="stat-preview-label">PV</span>
        <span class="stat-preview-value" id="opponentPreviewHP">—</span>
      </div>
      <div class="stat-preview">
        <span class="stat-icon">💙</span>
        <span class="stat-preview-label">Chakra</span>
        <span class="stat-preview-value" id="opponentPreviewChakra">—</span>
      </div>
    </div>
  </div>

  <div id="noOpponentMsg" class="card" style="display:none; text-align:center; color:var(--muted); font-size:0.85rem; padding: 20px 16px;">
    Aucun adversaire disponible pour ce tour.
  </div>

  <button class="btn btn-orange" id="startBtn" onclick="startCombat()" disabled style="opacity:0.4;">Commencer le combat →</button>
  <button class="btn btn-ghost" onclick="window.location.href='game_tracker.html'" style="margin-top:8px;">Annuler</button>
</div>

<script>
let roster = [
    {"name":"Naruto","team":"alliance","hp":12,"mp":5,"extra_mp":1,"available_from_turn":1},
    {"name":"Sasuke","team":"alliance","hp":10,"mp":3,"extra_mp":null,"available_from_turn":1},
    {"name":"Naruto 2","team":"alliance","hp":9,"mp":2,"extra_mp":null,"available_from_turn":2},
    {"name":"Kakashi","team":"alliance","hp":10,"mp":3,"extra_mp":null,"available_from_turn":1},
    {"name":"Kisame","team":"akatsuki","hp":15,"mp":5,"extra_mp":2,"available_from_turn":1},
    {"name":"Itachi","team":"akatsuki","hp":16,"mp":4,"extra_mp":null,"available_from_turn":1},
    {"name":"Obito","team":"akatsuki","hp":12,"mp":2,"extra_mp":null,"available_from_turn":2}
];
let selectedCharacter = null;
let selectedOpponent = null;

function getGameData() {
  return JSON.parse(sessionStorage.getItem('gameData')) || { team: null, turns: [] };
}

function getTeamLogoPath(team) {
  return team === 'alliance' ? 'img/alliance_shinobi.png' : 'img/akatsuki.png';
}

function populateSelect(selectId, characters) {
  const select = document.getElementById(selectId);
  select.innerHTML = '<option value="">— Sélectionner —</option>';
  characters.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name;
    opt.textContent = c.name;
    select.appendChild(opt);
  });
}

function initializePage() {
  const gameData = getGameData();

  if (!gameData.team) {
    window.location.href = 'index.html';
    return;
  }

  document.getElementById('teamLogo').src = getTeamLogoPath(gameData.team);

  const currentTurn = gameData.turns.length + 1;
  const myTeam = gameData.team.toLowerCase();
  const opponentTeam = myTeam === 'alliance' ? 'akatsuki' : 'alliance';

  const available = roster.filter(c =>
    c.team.toLowerCase() === myTeam && c.available_from_turn <= currentTurn
  );
  const opponents = roster.filter(c =>
    c.team.toLowerCase() === opponentTeam && c.available_from_turn <= currentTurn
  );

  if (available.length === 0) {
    document.getElementById('characterSelect').parentElement.style.display = 'none';
    document.getElementById('noCharMsg').style.display = 'block';
  } else {
    populateSelect('characterSelect', available);
  }

  if (opponents.length === 0) {
    document.getElementById('opponentSelect').parentElement.style.display = 'none';
    document.getElementById('noOpponentMsg').style.display = 'block';
  } else {
    populateSelect('opponentSelect', opponents);
  }
}

function renderStatsPreview(character, previewId, chakraId, hpId) {
  const preview = document.getElementById(previewId);
  if (!character) {
    preview.style.display = 'none';
    return;
  }
  document.getElementById(hpId).textContent = character.hp;
  document.getElementById(chakraId).textContent = character.extra_mp
    ? `${character.mp}+${character.extra_mp}`
    : character.mp;
  preview.style.display = 'block';
}

function updateStartButton() {
  const startBtn = document.getElementById('startBtn');
  const ready = selectedCharacter && selectedOpponent;
  startBtn.disabled = !ready;
  startBtn.style.opacity = ready ? '1' : '0.4';
}

function onCharacterChange() {
  const name = document.getElementById('characterSelect').value;
  selectedCharacter = roster.find(c => c.name === name) || null;
  renderStatsPreview(selectedCharacter, 'statsPreview', 'previewChakra', 'previewHP');
  updateStartButton();
}

function onOpponentChange() {
  const name = document.getElementById('opponentSelect').value;
  selectedOpponent = roster.find(c => c.name === name) || null;
  renderStatsPreview(selectedOpponent, 'opponentPreview', 'opponentPreviewChakra', 'opponentPreviewHP');
  updateStartButton();
}

function startCombat() {
  if (!selectedCharacter || !selectedOpponent) return;

  const totalChakra = (selectedCharacter.mp || 0) + (selectedCharacter.extra_mp || 0);
  const params = new URLSearchParams({
    name: selectedCharacter.name,
    hp: selectedCharacter.hp,
    chakra: totalChakra,
    opponent: selectedOpponent.name
  });

  window.location.href = `combat.html?${params.toString()}`;
}

window.addEventListener('load', initializePage);
</script>

</body>
</html>
