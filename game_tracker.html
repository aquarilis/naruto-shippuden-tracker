<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naruto — Suivi de Partie</title>
<link rel="stylesheet" href="style.css">
<script src="utils.js"></script>
<style>
body { padding: 16px 14px 32px; }

.header h1 { font-size: clamp(1rem, 4.5vw, 1.8rem); }

/* ── Stats section ── */
.stats {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
  text-align: center;
}

.stat-label {
  font-size: 0.7rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.stat-value {
  font-size: 2rem;
  font-weight: 900;
  color: var(--text);
}

/* ── History section ── */
.history { margin-bottom: 20px; }

.history-label {
  font-size: 0.7rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.history-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.9rem;
  cursor: pointer;
  gap: 10px;
}

.history-item:active { opacity: 0.75; }

.history-item-turn { color: var(--muted); font-weight: 700; white-space: nowrap; }

.history-item-character {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  margin-left: 10px;
}

.history-char-img-wrap {
  position: relative;
  display: inline-block;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid var(--border);
}

.history-char-img-wrap img {
  display: block;
  height: 64px;
  width: auto;
}

.history-char-img-wrap .loser-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 900;
  color: #fff;
  background: rgba(220, 38, 38, 0.55);
}

.history-char-img-wrap.loser img {
  filter: brightness(0.5);
}

.history-vs { color: var(--muted); font-size: 0.75rem; font-weight: 700; }

.history-item-result {
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.result-win  { background: rgba(67, 160, 71, 0.3);  color: var(--heal); }
.result-loss { background: rgba(229, 57, 53, 0.3);   color: var(--hp); }
.result-draw { background: rgba(158, 158, 158, 0.3); color: var(--muted); }

.empty-state {
  color: var(--muted);
  font-size: 0.85rem;
  text-align: center;
  padding: 20px;
}

/* ── Buttons ── */
.btn { margin-bottom: 10px; }

/* ── Combat log modal ── */
.log-modal-overlay {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 14px;
  overflow-y: auto;
}

.log-modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  width: 100%;
  max-width: 480px;
}

.log-modal-title {
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 4px;
}

.log-modal-subtitle {
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 16px;
}

.log-modal-entries {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
  font-size: 0.82rem;
  line-height: 1.5;
}

.log-modal-entries .c-round {
  color: var(--muted);
  font-style: italic;
  font-size: 0.75rem;
}

.log-modal-empty {
  color: var(--muted);
  font-size: 0.85rem;
  text-align: center;
  padding: 12px 0;
}
</style>
</head>
<body>

<div id="noDataScreen" class="hidden" style="text-align:center; padding-top: 60px;">
  <div style="font-size: 2.5rem; margin-bottom: 16px;">⚠️</div>
  <div style="font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 8px;">Aucune donnée de partie détectée</div>
  <div style="font-size: 0.85rem; color: var(--muted); margin-bottom: 32px;">Démarre une nouvelle partie depuis la page d'accueil.</div>
  <button type="button" class="btn btn-orange" onclick="window.location.href='index.html'">Retourner à l'accueil</button>
</div>

<div id="gameScreen">
<div class="header">
  <a href="index.html" aria-label="Retour à l'accueil"><img src="img/naruto_shippuden_logo.svg" alt="Naruto" class="header-logo-left"></a>
  <div class="header-center">
    <h1>Suivi de Partie</h1>
    <div id="teamName" style="font-size:0.8rem; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px;"></div>
  </div>
  <img id="teamLogo" src="" alt="Team" class="header-logo-right">
</div>

<div class="stats" style="display:flex; gap:12px;">
  <div style="flex:1;">
    <div class="stat-label">Tour Actuel</div>
    <div class="stat-value" id="tourCount">1</div>
  </div>
  <div style="flex:1; border-left: 1px solid var(--border); padding-left:12px;">
    <div class="stat-label">Points d'Expérience</div>
    <div class="stat-value" id="xpTotal" style="color: var(--orange2);">0</div>
  </div>
</div>

<button type="button" class="btn btn-orange" onclick="startNewTurn()">Commencer un nouveau tour</button>

<div class="history">
  <div class="history-label">Historique des tours</div>
  <div class="history-list" id="historyList">
    <div class="empty-state">Aucun tour pour l'instant</div>
  </div>
</div>

<div style="display:flex; gap:10px;">
  <button type="button" class="btn btn-ghost" id="btnUndoTurn" onclick="openUndoModal()" style="flex:1;">↩ Annuler le dernier tour</button>
  <button type="button" class="btn btn-ghost" onclick="window.location.href='index.html'" style="flex:1;">Quitter la partie</button>
</div>
</div>

<!-- ── Undo confirmation modal ── -->
<div id="undoModal" class="log-modal-overlay hidden" onclick="closeUndoModal(event)">
  <div class="log-modal" style="text-align:center;">
    <div style="font-size:2rem; margin-bottom:10px;">↩</div>
    <div class="log-modal-title" style="margin-bottom:6px;">Annuler le dernier tour ?</div>
    <div id="undoModalBody" class="log-modal-subtitle" style="margin-bottom:20px;"></div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <button type="button" class="btn btn-orange" onclick="confirmUndoLastTurn()">Confirmer l'annulation</button>
      <button type="button" class="btn btn-ghost" onclick="document.getElementById('undoModal').classList.add('hidden')">Annuler</button>
    </div>
  </div>
</div>

<!-- ── Combat log modal ── -->
<div id="logModal" class="log-modal-overlay hidden" onclick="closeLogModal(event)">
  <div class="log-modal">
    <div class="log-modal-title" id="logModalTitle"></div>
    <div class="log-modal-subtitle" id="logModalSubtitle"></div>
    <div class="log-modal-entries" id="logModalEntries"></div>
    <button type="button" class="btn btn-ghost" onclick="document.getElementById('logModal').classList.add('hidden')">Fermer</button>
  </div>
</div>

<script>
function renderGameTracker() {
  const gameData = getGameData();

  if (!gameData.team) {
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('noDataScreen').classList.remove('hidden');
    return;
  }

  // Set team logo and name
  document.getElementById('teamLogo').src = getTeamLogoPath(gameData.team);
  document.getElementById('teamName').textContent = gameData.team === 'shinobi' ? 'Alliance Shinobi' : 'Akatsuki';

  // Update tour count
  const nextTour = gameData.turns.length + 1;
  document.getElementById('tourCount').textContent = nextTour;

  // Compute total XP
  const totalXp = gameData.turns.reduce((sum, t) => {
    if (t.result === 'win' && t.exp) {
      return sum + (t.exp.xpCharacter || 0) + (t.exp.xpMission || 0) + (t.exp.xpSecondary || 0);
    }
    return sum;
  }, 0);
  document.getElementById('xpTotal').textContent = totalXp;

  // Toggle undo button
  const btnUndo = document.getElementById('btnUndoTurn');
  btnUndo.disabled = gameData.turns.length === 0;

  // Render history
  const historyList = document.getElementById('historyList');
  if (gameData.turns.length === 0) {
    historyList.innerHTML = '<div class="empty-state">Aucun tour pour l\'instant</div>';
  } else {
    historyList.innerHTML = [...gameData.turns].reverse().map(turn => {
      const resultClass = `result-${turn.result}`;
      const resultText = turn.result === 'win' ? 'Victoire' : turn.result === 'loss' ? 'Défaite' : 'Match nul';
      const xpBadge = turn.result === 'win' && turn.exp
        ? (() => {
            const total = (turn.exp.xpCharacter || 0) + (turn.exp.xpMission || 0) + (turn.exp.xpSecondary || 0);
            return total > 0 ? `<span style="font-size:0.7rem; color:var(--orange2);">+${total} XP</span>` : '';
          })()
        : '';

      // Determine who lost (to show red X overlay)
      const playerLost = turn.result === 'loss';
      const opponentLost = turn.result === 'win';

      const playerImgSrc = turn.playerCharacter.roster_image ? `img/roster/${turn.playerCharacter.roster_image}` : null;
      const opponentImgSrc = turn.opponentImage ? `img/roster/${turn.opponentImage}` : null;

      const loserOverlay = `<div class="loser-overlay">✕</div>`;

      const playerImgHtml = playerImgSrc
        ? `<div class="history-char-img-wrap"><img src="${playerImgSrc}" alt="${turn.playerCharacter.name}">${playerLost ? loserOverlay : ''}</div>`
        : `<span style="font-size:0.85rem;">${turn.playerCharacter.name}</span>`;

      const opponentHtml = turn.opponent
        ? (opponentImgSrc
            ? `<span class="history-vs">vs</span><div class="history-char-img-wrap"><img src="${opponentImgSrc}" alt="${turn.opponent}">${opponentLost ? loserOverlay : ''}</div>`
            : `<span class="history-vs">vs</span><span style="font-size:0.85rem;">${turn.opponent}</span>`)
        : '';

      return `
        <div class="history-item" onclick="openLogModal(${turn.turnNumber})">
          <span class="history-item-turn">Tour ${turn.turnNumber}</span>
          <span class="history-item-character">${playerImgHtml}${opponentHtml}${xpBadge}</span>
          <span class="history-item-result ${resultClass}">${resultText}</span>
        </div>
      `;
    }).join('');
  }
}

function startNewTurn() {
  window.location.href = 'character_selection.html';
}

function openUndoModal() {
  const gameData = getGameData();
  if (gameData.turns.length === 0) return;
  const last = gameData.turns[gameData.turns.length - 1];
  const matchup = `${last.playerCharacter.name}${last.opponent ? ` vs. ${last.opponent}` : ''}`;
  const resultText = last.result === 'win' ? 'Victoire' : last.result === 'loss' ? 'Défaite' : 'Match nul';
  let body = `Tour ${last.turnNumber} — ${matchup} (${resultText}) sera supprimé.`;
  if (last.result === 'win' && last.exp) {
    const total = (last.exp.xpCharacter || 0) + (last.exp.xpMission || 0) + (last.exp.xpSecondary || 0);
    if (total > 0) body += ` Les ${total} XP gagnés seront déduits.`;
  }
  document.getElementById('undoModalBody').textContent = body;
  document.getElementById('undoModal').classList.remove('hidden');
}

function closeUndoModal(event) {
  if (event.target === document.getElementById('undoModal')) {
    document.getElementById('undoModal').classList.add('hidden');
  }
}

function confirmUndoLastTurn() {
  const gameData = getGameData();
  if (gameData.turns.length === 0) return;
  gameData.turns.pop();
  sessionStorage.setItem('gameData', JSON.stringify(gameData));
  document.getElementById('undoModal').classList.add('hidden');
  renderGameTracker();
}

function openLogModal(turnNumber) {
  const gameData = getGameData();
  const turn = gameData.turns.find(t => t.turnNumber === turnNumber);
  if (!turn) return;

  const matchup = `${turn.playerCharacter.name}${turn.opponent ? ` vs. ${turn.opponent}` : ''}`;
  const resultText = turn.result === 'win' ? 'Victoire' : turn.result === 'loss' ? 'Défaite' : 'Match nul';

  document.getElementById('logModalTitle').textContent = `Tour ${turn.turnNumber} — ${matchup}`;
  document.getElementById('logModalSubtitle').textContent = `${resultText} · ${turn.combatRounds} round${turn.combatRounds > 1 ? 's' : ''}`;

  const entries = document.getElementById('logModalEntries');
  let html = '';

  if (turn.result === 'win' && turn.exp) {
    const { xpCharacter = 0, xpMission = 0, xpSecondary = 0 } = turn.exp;
    const total = xpCharacter + xpMission + xpSecondary;
    if (total > 0) {
      html += `<div style="background:rgba(255,145,0,0.1); border:1px solid rgba(255,145,0,0.3); border-radius:8px; padding:10px 12px; margin-bottom:8px;">`;
      html += `<div style="font-size:0.7rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--orange2); margin-bottom:6px;">🌟 XP gagnés</div>`;
      if (xpCharacter > 0) html += `<div>⭐ Personnage : <strong style="color:var(--orange2);">+${xpCharacter}</strong></div>`;
      if (xpMission   > 0) html += `<div>🎯 Mission : <strong style="color:var(--orange2);">+${xpMission}</strong></div>`;
      if (xpSecondary > 0) html += `<div>📋 Mission(s) secondaire(s) : <strong style="color:var(--orange2);">+${xpSecondary}</strong></div>`;
      html += `<div style="border-top:1px solid rgba(255,145,0,0.2); margin-top:6px; padding-top:6px;">Total : <strong style="color:var(--orange2);">+${total} XP</strong></div>`;
      html += `</div>`;
    }
  }

  if (!turn.combatLog || turn.combatLog.length === 0) {
    html += '<div class="log-modal-empty">Aucun historique disponible</div>';
  } else {
    html += turn.combatLog.map(line => `<div>${line}</div>`).join('');
  }

  entries.innerHTML = html;

  document.getElementById('logModal').classList.remove('hidden');
}

function closeLogModal(event) {
  if (event.target === document.getElementById('logModal')) {
    document.getElementById('logModal').classList.add('hidden');
  }
}

// Initialize on page load
window.addEventListener('load', renderGameTracker);
</script>

</body>
</html>
