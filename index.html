<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naruto — Suivi de Parties</title>
<style>
:root {
  --bg: #0e0e1a;
  --card: #16182e;
  --border: #2a2d50;
  --text: #e8e8f0;
  --muted: #7a7da0;
  --orange: #ff6d00;
  --orange2: #ff9100;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 14px;
}

.container {
  max-width: 320px;
  width: 100%;
  text-align: center;
}

img {
  max-width: 100%;
  width: auto;
  height: auto;
  margin-bottom: 32px;
  display: block;
}

.btn {
  display: block;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: opacity 0.12s, transform 0.08s;
  text-align: center;
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  color: #fff;
}

.btn:active { opacity: 0.75; transform: scale(0.97); }
</style>
</head>
<body>

<div class="container">
  <img src="img/naruto_shippuden_characters.png" alt="Naruto Characters">
  <button class="btn" onclick="window.location.href='team_selection.html'">Commencer une partie</button>
</div>

</body>
</html>
