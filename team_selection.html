<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naruto — Choix du Camp</title>
<link rel="stylesheet" href="style.css">
<style>
body { padding: 16px 14px 32px; }

/* ── Camp cards ── */
.cards-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.card {
  flex: 1 1 180px; /* grow, shrink, but never narrower than 180px */
  max-width: 320px;
  cursor: pointer;
  transition: transform 0.08s, border-color 0.12s;
  text-align: center;
}

.card:active { transform: scale(0.97); }

.card img {
  width: auto;
  height: 120px;
  margin-bottom: 12px;
  object-fit: contain;
}

.card-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html"><img src="img/naruto_shippuden_logo.svg" alt="Naruto" class="header-logo-left"></a>
  <div class="header-center">
    <h1>Choix du Camp</h1>
  </div>
  <div></div>
</div>

<div class="cards-row">
  <div class="card" onclick="selectTeam('alliance')">
    <img src="img/alliance_shinobi.svg" alt="Alliance Shinobi">
    <div class="card-title">Alliance Shinobi</div>
  </div>

  <div class="card" onclick="selectTeam('akatsuki')">
    <img src="img/akatsuki.svg" alt="Akatsuki">
    <div class="card-title">Akatsuki</div>
  </div>
</div>

<script>
function selectTeam(team) {
  // Initialize game data in sessionStorage
  const gameData = { team, turns: [] };
  sessionStorage.setItem('gameData', JSON.stringify(gameData));

  // Redirect to game tracker
  window.location.href = 'game_tracker.html';
}
</script>

</body>
</html>
